<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kariyer | Baştürk Holding</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .career-page {
            padding: 150px 0 100px;
            background-color: var(--bg-white);
        }
        .career-hero {
            text-align: center;
            margin-bottom: 80px;
        }
        .career-hero h1 {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .career-hero p {
            font-size: 20px;
            color: var(--light-gray);
            max-width: 700px;
            margin: 0 auto;
        }
        .application-form {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-light);
            border: 1px solid var(--border-gray);
            padding: 50px;
        }
        .application-form h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 0;
        }
        .file-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary-black);
            position: static;
            transform: none;
            background: transparent;
            padding: 0;
        }
        .file-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-gray);
            background-color: var(--bg-white);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }
        .file-input:hover {
            border-color: var(--primary-black);
        }
        .form-group.file-group {
            margin-bottom: 30px;
        }
        .form-group.file-group label {
            position: static;
            transform: none;
            background: transparent;
            padding: 0;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Baştürk Holding" class="logo-image">
            </a>
            <nav class="main-nav">
                <a href="index.html#hakkimizda">Hakkımızda</a>
                <a href="index.html#sirketlerimiz">Şirketlerimiz</a>
                <a href="index.html#timeline">Tarihçe</a>
                <a href="basinda-biz.html">Basında Biz</a>
                <a href="kariyer.html" class="active">Kariyer</a>
                <a href="index.html#iletisim">İletişim</a>
            </nav>
        </div>
    </header>

    <section class="career-page">
        <div class="container">
            <div class="career-hero">
                <h1>Kariyer Fırsatları</h1>
                <p>Baştürk Holding ailesi olarak, yetenekli ve tutkulu profesyonelleri aramaktayız. Geleceği birlikte inşa edelim.</p>
            </div>

            <div id="basvuru" class="application-form">
                <h2>Başvuru Formu</h2>
                <form class="contact-form" action="https://formsubmit.co/info@trair.com.tr" method="POST" enctype="multipart/form-data">
                    <!-- FormSubmit Configuration -->
                    <input type="hidden" name="_subject" value="Yeni Kariyer Başvurusu - Baştürk Holding">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_next" value="https://basturkholding.com/tesekkurler.html">
                    <input type="text" name="_honey" style="display:none">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="ad" name="ad" required placeholder=" ">
                            <label for="ad">Ad</label>
                        </div>
                        <div class="form-group">
                            <input type="text" id="soyad" name="soyad" required placeholder=" ">
                            <label for="soyad">Soyad</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="meslek" name="meslek" required placeholder=" ">
                            <label for="meslek">Meslek</label>
                        </div>
                        <div class="form-group">
                            <input type="number" id="yas" name="yas" required placeholder=" " min="18" max="65">
                            <label for="yas">Yaş</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="il" name="il" required placeholder=" ">
                            <label for="il">İl</label>
                        </div>
                        <div class="form-group">
                            <input type="text" id="ilce" name="ilce" required placeholder=" ">
                            <label for="ilce">İlçe</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="tel" id="telefon" name="telefon" required placeholder=" ">
                            <label for="telefon">İletişim Numarası</label>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" name="email" required placeholder=" ">
                            <label for="email">E-posta</label>
                        </div>
                    </div>
                    <div class="form-group file-group">
                        <label class="file-label" for="cv">CV Dosyası Ekle (PDF, DOC, DOCX)</label>
                        <input type="file" id="cv" name="attachment" accept=".pdf,.doc,.docx" class="file-input">
                    </div>
                    <button type="submit" class="submit-btn">Gönder</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Baştürk Holding. Tüm hakları saklıdır.</p>
            </div>
        </div>
    </footer>
</body>
</html>
